<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly Banking</title>
<style>
    :root{
        --bg1: #0a0a0f;
        --bg2: #111827;
        --card: rgba(31, 41, 55, 0.85);
        --card2: rgba(55, 65, 81, 0.75);
        --gold: #fcd34d;
        --green: #4ade80;
        --red: #f87171;
        --blue: #60a5fa;
        --purple: #a78bfa;
        --text: #f1f5f9;
        --muted: #cbd5e1;
        --border: rgba(251, 191, 36, 0.15);
        --accent: #fbbf24;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Playfair+Display:wght@700&display=swap');

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        background:
            radial-gradient(circle at 25% 15%, rgba(251,191,36,0.25), transparent 50%),
            radial-gradient(circle at 75% 85%, rgba(167,139,250,0.2), transparent 50%),
            linear-gradient(145deg, var(--bg1), var(--bg2));
        color:var(--text);
        font-family: 'Inter', system-ui, sans-serif;
        padding: 30px 20px;
        overflow-x: hidden;
    }

    .container{
        max-width: 1480px;
        margin: auto;
    }

    h1{
        text-align:center;
        font-family: 'Playfair Display', sans-serif;
        font-size: clamp(2.4rem, 5vw, 3.2rem);
        font-weight:900;
        background: linear-gradient(90deg, var(--gold), #fff, var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
        margin-bottom: 40px;
        text-shadow: 0 10px 30px rgba(251,191,36,0.3);
    }

    /* SLOT CARDS */
    .slots{
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 28px;
    }

    .slot{
        background: var(--card);
        backdrop-filter: blur(20px);
        border: 1.5px solid var(--border);
        border-radius: 32px;
        padding: 40px 30px;
        text-align: center;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 20px 50px -15px rgba(0,0,0,0.5);
    }

    .slot:hover{
        transform: translateY(-12px) scale(1.02);
        box-shadow: 0 30px 70px -10px rgba(251,191,36,0.25);
        border-color: var(--gold);
    }

    .slot::before{
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(251,191,36,0.12), transparent);
        opacity: 0;
        transition: opacity 0.4s;
    }

    .slot:hover::before{
        opacity: 1;
    }

    .slot h2{
        color: var(--gold);
        margin-bottom: 16px;
        font-size: 1.65rem;
        font-weight: 800;
    }

    .slot p{
        color: var(--muted);
        font-size: 1.05rem;
        margin-bottom: 24px;
    }

    .deleteBtn{
        margin-top: 10px;
        border: none;
        background: linear-gradient(135deg, #f87171, #ef4444);
        color: white;
        padding: 12px 28px;
        border-radius: 9999px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(248, 113, 113, 0.3);
    }

    .deleteBtn:hover{
        transform: scale(1.05);
        box-shadow: 0 12px 25px rgba(248, 113, 113, 0.4);
    }

    /* TOP BAR */
    .topBar{
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        margin-bottom: 45px;
        flex-wrap: wrap;
    }

    .backBtn{
        border: none;
        background: linear-gradient(135deg, var(--gold), #f59e0b);
        color: #111827;
        padding: 14px 32px;
        border-radius: 9999px;
        font-weight: 800;
        font-size: 1.05rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        box-shadow: 0 10px 30px rgba(251, 191, 36, 0.35);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .backBtn:hover{
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(251, 191, 36, 0.45);
    }

    /* PLAYER CARDS */
    .playerGrid{
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 28px;
        margin-bottom: 45px;
    }

    .playerCard{
        background: var(--card);
        backdrop-filter: blur(20px);
        border: 1.5px solid var(--border);
        border-radius: 32px;
        padding: 32px 24px;
        text-align: center;
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 20px 50px -15px rgba(0,0,0,0.5);
    }

    .playerCard:hover{
        transform: translateY(-12px) scale(1.02);
        border-color: var(--gold);
        box-shadow: 0 30px 70px -10px rgba(251,191,36,0.25);
    }

    .playerCard::before{
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, rgba(251,191,36,0.15) 20%, transparent 70%);
        border-radius: 50%;
        top: -100px;
        right: -100px;
        z-index: 0;
    }

    .token{
        font-size: 5.2rem;
        line-height: 1;
        margin-bottom: 18px;
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        transition: transform 0.4s ease;
    }

    .playerCard:hover .token{
        transform: scale(1.15) rotate(8deg);
    }

    .playerCard h2{
        font-size: 1.55rem;
        margin-bottom: 20px;
        font-weight: 700;
        color: var(--text);
    }

    .balance{
        background: rgba(15, 23, 42, 0.9);
        border: 2px solid rgba(74, 222, 128, 0.4);
        border-radius: 24px;
        padding: 22px 20px;
        font-size: 2.1rem;
        font-weight: 900;
        color: var(--green);
        letter-spacing: -0.5px;
        box-shadow: inset 0 4px 12px rgba(0,0,0,0.3);
    }

    /* ACTIONS */
    .actions{
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        max-width: 920px;
        margin: 0 auto;
    }

    .actionBtn{
        border: none;
        border-radius: 28px;
        padding: 26px 20px;
        color: white;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 15px 35px rgba(0,0,0,0.35);
        position: relative;
        overflow: hidden;
    }

    .actionBtn::before{
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        transition: 0.6s;
    }

    .actionBtn:hover::before{
        left: 200%;
    }

    .actionBtn:hover{
        transform: translateY(-8px);
    }

    .go{
        background: linear-gradient(135deg, #4ade80, #22c55e);
    }

    .jail{
        background: linear-gradient(135deg, #f87171, #ef4444);
    }

    .buy{
        background: linear-gradient(135deg, #60a5fa, #3b82f6);
    }

    .rent{
        background: linear-gradient(135deg, #a78bfa, #8b5cf6);
    }

    /* POPUP */
    .overlay{
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        backdrop-filter: blur(12px);
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .modal{
        width: min(620px, 92%);
        background: rgba(31, 41, 55, 0.95);
        backdrop-filter: blur(24px);
        border: 1.5px solid var(--border);
        border-radius: 36px;
        padding: 40px 36px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
        from {
            opacity: 0;
            transform: scale(0.7) translateY(40px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    .modal h2{
        text-align: center;
        color: var(--gold);
        margin-bottom: 32px;
        font-size: 2rem;
        font-weight: 800;
    }

    .selectGrid{
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 20px;
    }

    .selectBtn{
        background: var(--card2);
        border: 1.5px solid var(--border);
        color: white;
        border-radius: 26px;
        padding: 28px 16px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.35s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .selectBtn:hover{
        transform: translateY(-6px) scale(1.04);
        border-color: var(--gold);
        box-shadow: 0 20px 40px rgba(251,191,36,0.2);
    }

    .selectBtn span{
        font-size: 4.2rem;
        transition: transform 0.4s ease;
    }

    .selectBtn:hover span{
        transform: scale(1.2);
    }

    .cancelBtn{
        width: 100%;
        margin-top: 24px;
        border: none;
        background: linear-gradient(135deg, #f87171, #ef4444);
        color: white;
        padding: 18px;
        border-radius: 9999px;
        font-weight: 700;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .cancelBtn:hover{
        transform: scale(1.02);
    }

    /* ACTIVE STATES */
    .slot:active,
    .playerCard:active,
    .actionBtn:active,
    .backBtn:active,
    .deleteBtn:active,
    .selectBtn:active,
    .cancelBtn:active{
        transform: scale(0.95);
    }

    /* RESPONSIVE */
    @media(max-width: 768px){
        body{
            padding: 20px 12px;
        }

        .topBar{
            flex-direction: column;
            text-align: center;
        }

        .playerGrid,
        .actions{
            grid-template-columns: 1fr;
        }

        .token{
            font-size: 4.2rem;
        }

        .balance{
            font-size: 1.75rem;
        }
    }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const TOKENS = [
    {name:"Aeroplane",emoji:"✈️"},
    {name:"Ship",emoji:"🚢"},
    {name:"Car",emoji:"🚗"},
    {name:"Helicopter",emoji:"🚁"}
];


const PROPERTY_DATA = {
  1: { name: "Old Kent Road", price: 60, rents: [70,130,220,370,750] },
  2: { name: "Whitechapel Road", price: 60, rents: [70,130,220,370,750] },
  3: { name: "The Angel, Islington", price: 100, rents: [80,140,240,410,800] },
  4: { name: "Euston Road", price: 100, rents: [80,140,240,410,800] },
  5: { name: "Pentonville Road", price: 120, rents: [100,160,260,440,860] },
  6: { name: "Pall Mall", price: 140, rents: [110,180,290,460,900] },
  7: { name: "Whitehall", price: 140, rents: [110,180,290,460,900] },
  8: { name: "Northumberland Avenue", price: 160, rents: [130,200,310,490,980] },
  9: { name: "Bow Street", price: 180, rents: [140,210,330,520,1000] },
  10: { name: "Marlborough Street", price: 180, rents: [140,210,330,520,1000] },
  11: { name: "Vine Street", price: 200, rents: [160,230,350,550,1100] },
  12: { name: "Strand", price: 220, rents: [170,250,380,580,1160] },
  13: { name: "Fleet Street", price: 220, rents: [170,250,380,580,1160] },
  14: { name: "Trafalgar Square", price: 240, rents: [190,270,400,610,1200] },
  15: { name: "Leicester Square", price: 260, rents: [200,280,420,640,1300] },
  16: { name: "Coventry Street", price: 260, rents: [200,280,420,640,1300] },
  17: { name: "Piccadilly", price: 280, rents: [220,300,440,670,1340] },
  18: { name: "Regent Street", price: 300, rents: [230,320,460,700,1400] },
  19: { name: "Oxford Street", price: 300, rents: [230,320,460,700,1400] },
  20: { name: "Bond Street", price: 320, rents: [250,340,480,730,1440] },
  21: { name: "Park Lane", price: 350, rents: [270,360,510,740,1500] },
  22: { name: "Mayfair", price: 400, rents: [300,400,560,810,1600] }
};

let currentSlot = null;
let game = null;

function saveGame(){
    localStorage.setItem(
        "monopoly_slot_" + currentSlot,
        JSON.stringify(game)
    );
}

function loadSlots(){
    const app = document.getElementById("app");

    let html = `
        <h1>🎲 Monopoly Banking</h1>
        <div class="slots">
    `;

    for(let i=1;i<5;i++){
        const data = localStorage.getItem(
            "monopoly_slot_" + i
        );

        html += `
            <div class="slot" onclick="openSlot(${i})">
                <h2>Save Slot ${i}</h2>
                <p>${data ? "Saved Game" : "Empty Slot"}</p>

                ${
                    data
                    ? `
                    <button class="deleteBtn"
                    onclick="event.stopPropagation();deleteSlot(${i})">
                    🗑️ Delete
                    </button>
                    `
                    : ""
                }
            </div>
        `;
    }

    html += "</div>";
    app.innerHTML = html;
}

function deleteSlot(slot){
    if(confirm("Delete this save?")){
        localStorage.removeItem(
            "monopoly_slot_" + slot
        );
        loadSlots();
    }
}

function openSlot(slot){
    currentSlot = slot;

    const saved = localStorage.getItem(
        "monopoly_slot_" + slot
    );

    if(saved){
        game = JSON.parse(saved);
        renderGame();
        return;
    }

    let players = parseInt(
        prompt("How many players? (2-4)")
    );

    if(
        isNaN(players) ||
        players < 2 ||
        players > 4
    ){
        return;
    }

    game = {
        players:[],
        properties:{}
    };

    for(let i=1;i<=22;i++){
        game.properties[i]={
            owner:null,
            level:1
        };
    }

    for(let i=0;i<players;i++){
        game.players.push({
            name:TOKENS[i].name,
            emoji:TOKENS[i].emoji,
            balance:2000
        });
    }

    saveGame();
    renderGame();
}

function renderGame(){

    const app = document.getElementById("app");

    let html = `
        <div class="topBar">
            <h1>🎲 Monopoly Banking</h1>

            <button class="backBtn"
            onclick="loadSlots()">
                ← Back to Slots
            </button>
        </div>

        <div class="playerGrid">
    `;

    game.players.forEach(player => {

        html += `
            <div class="playerCard">

                <div class="token">
                    ${player.emoji}
                </div>

                <h2>${player.name}</h2>

                <div class="balance">
                    $${player.balance.toLocaleString()}
                </div>

            </div>
        `;
    });

    html += `
        </div>

        <div class="actions">

            <button class="actionBtn go"
            onclick="openPlayerPopup('go')">
                🏁 Pass GO +$200
            </button>

            <button class="actionBtn jail"
            onclick="openPlayerPopup('jail')">
                🚔 Go To Jail -$50
            </button>

            <button class="actionBtn buy"
            onclick="openPlayerPopup('buy')">
                🏠 Buy Property
            </button>

            <button class="actionBtn rent"
            onclick="openPlayerPopup('rent')">
                💸 Pay Rent
            </button>

        </div>
    `;

    app.innerHTML = html;
}

function openPlayerPopup(action){

    let html = `
        <div class="overlay" id="overlay">
            <div class="modal">

                <h2>Select Player</h2>

                <div class="selectGrid">
    `;

    game.players.forEach((player,index)=>{

        html += `
            <button class="selectBtn"
            onclick="doAction('${action}',${index})">

                <span>${player.emoji}</span>
                ${player.name}

            </button>
        `;
    });

    html += `
                </div>

                <button class="cancelBtn"
                onclick="closePopup()">
                    Cancel
                </button>

            </div>
        </div>
    `;

    document.body.insertAdjacentHTML(
        "beforeend",
        html
    );
}

function closePopup(){
    const overlay =
        document.getElementById("overlay");

    if(overlay){
        overlay.remove();
    }
}


function doAction(action,index){

    if(action==="go"){
        game.players[index].balance += 200;
    }

    if(action==="jail"){
        game.players[index].balance -= 50;
    }

    if(action==="buy"){
        const propertyNo = parseInt(prompt("Property number (1-22)"));

        if(isNaN(propertyNo) || !PROPERTY_DATA[propertyNo]){
            alert("Invalid property number.");
            return;
        }

        const property = game.properties[propertyNo];
        const data = PROPERTY_DATA[propertyNo];

        if(property.owner !== null){
            alert(data.name + " is already owned.");
            return;
        }

        if(game.players[index].balance < data.price){
            alert("Not enough money to buy " + data.name);
            return;
        }

        if(confirm(`Buy ${data.name} for $${data.price}?`)){
            game.players[index].balance -= data.price;
            property.owner = index;
            property.level = 1;
            alert(`${game.players[index].name} bought ${data.name}`);
        }
    }

    if(action==="rent"){
        const propertyNo = parseInt(prompt("Property number (1-22)"));

        if(isNaN(propertyNo) || !PROPERTY_DATA[propertyNo]){
            alert("Invalid property number.");
            return;
        }

        const property = game.properties[propertyNo];
        const data = PROPERTY_DATA[propertyNo];

        if(property.owner === null){
            alert(data.name + " has not been purchased yet.");
            return;
        }

        const owner = property.owner;
        const level = property.level;
        const rent = data.rents[level - 1];

        if(owner !== index){
            game.players[index].balance -= rent;
            game.players[owner].balance += rent;

            alert(
                `${game.players[index].name} paid $${rent} to ${game.players[owner].name} for ${data.name}`
            );
        } else {
            alert(
                `${game.players[index].name} owns ${data.name}. No rent paid.`
            );
        }

        if(property.level < 5){
            property.level++;
        }

        alert(
            `${data.name} is now at Rent Level ${property.level}`
        );
    }

    saveGame();
    closePopup();
    renderGame();
}


loadSlots();
</script>

</body>
</html>
